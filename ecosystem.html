<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StellarMonitor — Ecosystem</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+CiAgPHJlY3Qgd2lkdGg9IjMyIiBoZWlnaHQ9IjMyIiByeD0iNiIgZmlsbD0iIzAyMDQwYSIvPgogIDxjaXJjbGUgY3g9IjE2IiBjeT0iMTYiIHI9IjEzIiBmaWxsPSJub25lIiBzdHJva2U9IiMwMGM4ZmYiIHN0cm9rZS13aWR0aD0iMS41IiBvcGFjaXR5PSIwLjQiLz4KICA8dGV4dCB4PSIxNiIgeT0iMjIiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGZvbnQtZmFtaWx5PSJBcmlhbCBCbGFjayIgZm9udC13ZWlnaHQ9IjkwMCIgZm9udC1zaXplPSIxNyIgZmlsbD0iIzAwYzhmZiI+UzwvdGV4dD4KPC9zdmc+">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#05080d;--panel:#0c1220;--panel2:#0f1628;
  --edge:rgba(255,255,255,0.07);--edge2:rgba(255,255,255,0.03);
  --cyan:#00c8ff;--green:#00e87a;--orange:#ff8c00;--red:#ff3d5a;
  --purple:#a78bfa;--yellow:#fbbf24;
  --white:#f0f4fa;--gray1:#8da0b8;--gray2:#4a6380;
  --mono:'DM Mono',monospace;--sans:'Outfit',sans-serif;
}
html,body{background:var(--bg);color:var(--white);font-family:var(--sans);-webkit-font-smoothing:antialiased;min-height:100vh}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:500;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 40px;background:rgba(5,8,13,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--edge)}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--white);font-weight:700;font-size:15px}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--cyan);box-shadow:0 0 10px var(--cyan)}
.nav-center{position:absolute;left:50%;transform:translateX(-50%);display:flex;gap:1px;white-space:nowrap}
.nav-link{font-family:var(--mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--gray1);text-decoration:none;padding:7px 16px;border-radius:3px;transition:all .15s;border:1px solid transparent}
.nav-link:hover{color:var(--white);background:rgba(255,255,255,.05);border-color:var(--edge)}
.nav-link.active{color:var(--cyan);border-color:rgba(0,200,255,.3);background:rgba(0,200,255,.06)}
.nav-cta{font-family:var(--mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;padding:7px 18px;border:1px solid var(--cyan);color:var(--cyan);border-radius:3px;text-decoration:none;transition:all .15s}
.nav-cta:hover{background:var(--cyan);color:var(--bg)}
.nav-right{display:flex;gap:8px;flex-shrink:0}

/* LAYOUT */
.layout{display:grid;grid-template-columns:240px 1fr;min-height:100vh;padding-top:56px}

/* SIDEBAR */
.sidebar{position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto;border-right:1px solid var(--edge);background:rgba(5,8,13,0.5)}
.sidebar::-webkit-scrollbar{width:2px}
.sb-sec{padding:14px 16px;border-bottom:1px solid var(--edge2)}
.sb-title{font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--gray2);margin-bottom:10px}

/* Stats */
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:2px 0}
.stat-lbl{font-family:var(--mono);font-size:9px;color:var(--gray2);text-transform:uppercase;letter-spacing:1px}
.stat-val{font-family:var(--mono);font-size:11px;font-weight:500}
.cv{color:var(--cyan)}.gv{color:var(--green)}

/* Search */
.search-wrap{position:relative}
.search-input{width:100%;background:var(--panel);border:1px solid var(--edge);border-radius:4px;padding:8px 12px 8px 30px;font-family:var(--mono);font-size:11px;color:var(--white);outline:none;transition:border-color .15s}
.search-input:focus{border-color:var(--cyan)}
.search-input::placeholder{color:var(--gray2)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--gray2);font-size:12px;pointer-events:none}

/* ── FIX 1: Category checkboxes ── */
.cat-item{display:flex;align-items:center;justify-content:space-between;padding:6px 8px;border-radius:4px;border:1px solid transparent;cursor:pointer;transition:all .15s;user-select:none;margin-bottom:1px}
.cat-item:hover{background:rgba(255,255,255,.04);border-color:var(--edge)}
.cat-item.active{background:rgba(0,200,255,.08);border-color:rgba(0,200,255,.25)}
.cat-left{display:flex;align-items:center;gap:8px}
/* Custom checkbox box */
.cat-check{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--gray2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.cat-item.active .cat-check{background:var(--cyan);border-color:var(--cyan)}
.cat-check svg{display:none;width:9px;height:9px}
.cat-item.active .cat-check svg{display:block}
.cat-icon-emoji{font-size:13px;width:18px;text-align:center;line-height:1}
.cat-lbl{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.3px;color:var(--gray1);transition:color .15s}
.cat-item.active .cat-lbl{color:var(--cyan)}
.cat-count{font-family:var(--mono);font-size:9px;color:var(--gray2);background:var(--panel2);padding:1px 5px;border-radius:8px}
.cat-item.active .cat-count{color:var(--cyan)}

/* Sort */
.sort-btns{display:flex;flex-direction:column;gap:3px}
.sort-btn{padding:5px 8px;border-radius:3px;border:1px solid var(--edge);background:transparent;cursor:pointer;font-family:var(--mono);font-size:10px;color:var(--gray1);text-align:left;transition:all .15s}
.sort-btn:hover{border-color:rgba(255,255,255,.2);color:var(--white)}
.sort-btn.active{border-color:rgba(0,200,255,.4);color:var(--cyan);background:rgba(0,200,255,.06)}

/* Status chips */
.chips{display:flex;gap:4px;flex-wrap:wrap}
.chip{font-family:var(--mono);font-size:9px;padding:3px 8px;border-radius:2px;border:1px solid var(--edge);cursor:pointer;color:var(--gray1);transition:all .15s;background:transparent}
.chip:hover{border-color:rgba(255,255,255,.2);color:var(--white)}
.chip.active{border-color:var(--green);color:var(--green);background:rgba(0,232,122,.06)}

/* Feature checkboxes */
.feat-row{display:flex;align-items:center;gap:8px;padding:4px 0;cursor:pointer}
.feat-row input{accent-color:var(--cyan)}
.feat-lbl{font-family:var(--mono);font-size:10px;color:var(--gray1)}

/* MAIN */
.main{padding:20px 28px;min-height:calc(100vh - 56px)}
.toolbar{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.page-title{font-size:22px;font-weight:700;flex-shrink:0}
.result-count{font-family:var(--mono);font-size:10px;color:var(--gray2)}
.toolbar-spacer{flex:1}
.vt-wrap{display:flex;gap:3px;align-items:center}
.vt-lbl{font-family:var(--mono);font-size:9px;color:var(--gray2);text-transform:uppercase;letter-spacing:1px;margin-right:4px}
.vt-btn{padding:5px 10px;border:1px solid var(--edge);border-radius:3px;background:transparent;cursor:pointer;font-family:var(--mono);font-size:9px;color:var(--gray1);transition:all .15s}
.vt-btn:hover{color:var(--white);border-color:rgba(255,255,255,.2)}
.vt-btn.active{color:var(--cyan);border-color:rgba(0,200,255,.4);background:rgba(0,200,255,.06)}

/* ── GRID ── */
#grid-view{display:grid;grid-template-columns:repeat(auto-fill,minmax(275px,1fr));gap:10px}

/*
  FIX 2: card is a <div> not <a> — socials are nested <a> inside,
  which is valid. Card click handled via JS.
*/
.project-card{background:var(--panel);border:1px solid var(--edge);border-radius:8px;padding:16px 18px;cursor:pointer;transition:all .2s;position:relative;overflow:visible;display:block;animation:fadeIn .25s ease forwards}
.project-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,200,255,.03) 0%,transparent 60%);opacity:0;transition:opacity .2s;pointer-events:none}
.project-card:hover{border-color:rgba(0,200,255,.3);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.project-card:hover::before{opacity:1}

.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.card-logo{width:34px;height:34px;border-radius:8px;background:var(--panel2);border:1px solid var(--edge);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.card-badges{display:flex;gap:3px;flex-wrap:wrap;justify-content:flex-end}
.badge{font-family:var(--mono);font-size:8px;letter-spacing:.3px;padding:2px 6px;border-radius:2px;text-transform:uppercase}
.b-live{background:rgba(0,232,122,.12);color:var(--green);border:1px solid rgba(0,232,122,.3)}
.b-beta{background:rgba(251,191,36,.1);color:var(--yellow);border:1px solid rgba(251,191,36,.3)}
.b-new{background:rgba(167,139,250,.12);color:var(--purple);border:1px solid rgba(167,139,250,.3)}
.b-audit{background:rgba(0,200,255,.08);color:var(--cyan);border:1px solid rgba(0,200,255,.2)}
.b-verified{background:rgba(0,232,122,.12);color:var(--green);border:1px solid rgba(0,232,122,.4);cursor:help}
.b-trusted{background:rgba(0,200,255,.08);color:var(--cyan);border:1px solid rgba(0,200,255,.2)}
.b-caution{background:rgba(255,140,0,.1);color:var(--orange);border:1px solid rgba(255,140,0,.3)}

.card-name{font-size:14px;font-weight:600;margin-bottom:2px;color:var(--white)}
.card-cat{font-family:var(--mono);font-size:9px;color:var(--gray2);text-transform:uppercase;letter-spacing:1px;margin-bottom:7px}
.card-desc{font-size:11px;color:var(--gray1);line-height:1.5;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-metrics{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:10px 0;border-top:1px solid var(--edge2);border-bottom:1px solid var(--edge2);margin-bottom:10px}
.metric-lbl{font-family:var(--mono);font-size:8px;color:var(--gray2);text-transform:uppercase;letter-spacing:.5px}
.metric-val{font-family:var(--mono);font-size:11px;color:var(--white);font-weight:500}
.metric-val.cyan{color:var(--cyan)}

/* Card footer: socials left, chain right */
.card-footer{display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-socials{display:flex;gap:5px;align-items:center}

/* Social icon buttons — proper size and alignment */
.soc-btn{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:4px;border:1px solid var(--edge);background:transparent;text-decoration:none;color:var(--gray1);transition:all .15s;flex-shrink:0}
.soc-btn:hover{border-color:rgba(255,255,255,.3);color:var(--white);background:rgba(255,255,255,.05)}
.soc-btn.tw:hover{border-color:rgba(29,155,240,.5);color:#1d9bf0;background:rgba(29,155,240,.08)}
.soc-btn.dc:hover{border-color:rgba(88,101,242,.5);color:#5865f2;background:rgba(88,101,242,.08)}
.soc-btn svg{display:block;width:13px;height:13px;flex-shrink:0}

.card-site{font-family:var(--mono);font-size:9px;color:var(--gray2);display:flex;align-items:center;gap:3px;text-decoration:none;transition:color .15s}
.card-site:hover{color:var(--cyan)}
.chain-dot{width:5px;height:5px;border-radius:50%;background:var(--cyan);display:inline-block;flex-shrink:0}

/* Cat headers in grid */
.cat-header{grid-column:1/-1;display:flex;align-items:center;gap:10px;margin-top:6px;margin-bottom:2px}
.cat-header-line{flex:1;height:1px;background:var(--edge)}
.cat-header-lbl{font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--gray2);white-space:nowrap}

/* ── TABLE ── */
#table-view{display:none}
.table-wrap{background:var(--panel);border:1px solid var(--edge);border-radius:8px;overflow:hidden}
.table-head{display:grid;grid-template-columns:28px 32px 2fr 110px 110px 90px 100px;padding:9px 16px;background:var(--panel2);border-bottom:1px solid var(--edge);font-family:var(--mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gray2);gap:6px;align-items:center}
.th{cursor:pointer;transition:color .15s;user-select:none}
.th:hover{color:var(--white)}
.th.sorted{color:var(--cyan)}
.tr-main{display:grid;grid-template-columns:28px 32px 2fr 110px 110px 90px 100px;padding:10px 16px;border-bottom:1px solid var(--edge2);align-items:center;gap:6px;cursor:pointer;transition:background .12s}
.tr-main:hover{background:rgba(0,200,255,.03)}
.tr-expand-btn{width:22px;height:22px;border-radius:3px;border:1px solid var(--edge);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--gray2);transition:all .15s;flex-shrink:0;font-family:var(--mono)}
.tr-expand-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.tr-expand-btn.open{border-color:var(--cyan);color:var(--cyan);background:rgba(0,200,255,.08)}
.tr-links{display:none;padding:8px 16px 10px calc(28px + 32px + 12px + 16px);background:rgba(0,200,255,.02);border-bottom:1px solid var(--edge2);gap:8px;align-items:center;flex-wrap:wrap}
.tr-links.open{display:flex}
.tr-link-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:3px;border:1px solid var(--edge);background:transparent;text-decoration:none;font-family:var(--mono);font-size:9px;color:var(--gray1);transition:all .15s}
.tr-link-btn:hover{color:var(--white);background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.2)}
.tr-link-btn.site:hover{border-color:rgba(0,200,255,.4);color:var(--cyan);background:rgba(0,200,255,.06)}
.tr-link-btn.tw:hover{border-color:rgba(29,155,240,.4);color:#1d9bf0;background:rgba(29,155,240,.06)}
.tr-link-btn.dc:hover{border-color:rgba(88,101,242,.4);color:#5865f2;background:rgba(88,101,242,.06)}
.tr-link-btn svg{flex-shrink:0;display:block}
.tr-num{font-family:var(--mono);font-size:10px;color:var(--gray2)}
.tr-name-wrap{display:flex;align-items:center;gap:8px;min-width:0}
.tr-logo{width:26px;height:26px;border-radius:5px;background:var(--panel2);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;border:1px solid var(--edge)}
.tr-info{display:flex;flex-direction:column;gap:1px;min-width:0}
.tr-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tr-cat{font-family:var(--mono);font-size:8px;color:var(--gray2)}
.tr-val{font-family:var(--mono);font-size:11px;text-align:right}
.tr-status{display:flex;justify-content:flex-end}

.empty{grid-column:1/-1;padding:60px;text-align:center;color:var(--gray2);font-family:var(--mono);font-size:11px}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:900px){.layout{grid-template-columns:1fr}.sidebar{display:none}.nav-center{display:none}}

/* Global tooltip */
#g-tip{position:fixed;background:rgba(2,4,10,0.97);color:#f0f4fa;font-family:'DM Mono',monospace;font-size:10px;padding:5px 10px;border-radius:3px;border:1px solid rgba(0,232,122,.4);pointer-events:none;z-index:999999;white-space:nowrap;display:none;transform:translateX(-50%)}

/* Category pills on cards */
.cat-pill{display:inline-flex;align-items:center;gap:3px;font-family:var(--mono);font-size:8px;text-transform:uppercase;letter-spacing:.5px;padding:2px 6px;border-radius:2px;border:1px solid rgba(0,200,255,.25);color:var(--cyan);background:rgba(0,200,255,.06);margin-right:3px}
</style>
</head>
<body>
<div id="g-tip"></div>
<nav>
  <a href="/" class="logo"><div class="logo-dot"></div>StellarMonitor</a>
  <div class="nav-center">
    <a href="/feed"      class="nav-link">Live Feed</a>
    <a href="/scanner"   class="nav-link">Scanner</a>
    <a href="/graph"     class="nav-link">Graph</a>
    <a href="/pools"     class="nav-link">Pools</a>
    <a href="/soroban"   class="nav-link">Soroban</a>
    <a href="/ecosystem" class="nav-link active">Ecosystem</a>
    <a href="/docs"      class="nav-link">Docs</a>
  </div>
  <div class="nav-right">
    <a href="https://t.me/stellarmonitor" class="nav-cta" style="border-color:rgba(0,200,255,.4);background:rgba(0,200,255,.06)" target="_blank" rel="noopener">Telegram ↗</a>
    <a href="https://x.com/StellarMonitor" class="nav-cta" target="_blank" rel="noopener">Follow ↗</a>
  </div>
</nav>

<div class="layout">
  <aside class="sidebar">
    <div class="sb-sec">
      <div class="sb-title">Overview</div>
      <div class="stat-row"><span class="stat-lbl">Projects</span><span class="stat-val cv" id="st-total">—</span></div>
      <div class="stat-row"><span class="stat-lbl">Live</span><span class="stat-val gv" id="st-live">—</span></div>
      <div class="stat-row"><span class="stat-lbl">Total TVL</span><span class="stat-val" id="st-tvl">—</span></div>
      <div class="stat-row"><span class="stat-lbl">Soroban Native</span><span class="stat-val cv" id="st-sor">—</span></div>
    </div>
    <div class="sb-sec">
      <div class="sb-title">Search</div>
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input class="search-input" id="search" placeholder="Project name..." autocomplete="off" maxlength="50">
      </div>
    </div>
    <div class="sb-sec">
      <div class="sb-title">Category · multi-select</div>
      <div id="cat-list"></div>
    </div>
    <div class="sb-sec">
      <div class="sb-title">Sort By</div>
      <div class="sort-btns">
                <button class="sort-btn active" data-sort="tvl">↓ TVL</button>
        <button class="sort-btn" data-sort="launched">↓ Newest First</button>
        <button class="sort-btn" data-sort="users">↓ Users</button>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="toolbar">
      <div class="page-title">Ecosystem</div>
      <div class="result-count" id="result-count"></div>
      <div class="toolbar-spacer"></div>
      <div class="vt-wrap">
        <span class="vt-lbl">View</span>
        <button class="vt-btn active" id="btn-grid" onclick="setView('grid')">⊞ Grid</button>
        <button class="vt-btn" id="btn-table" onclick="setView('table')">≡ Table</button>
      </div>
    </div>
    <div id="grid-view"></div>
    <div id="table-view">
      <div class="table-wrap">
        <div class="table-head">
          <div></div>
          <div class="th">#</div>
          <div class="th sorted" data-col="name" onclick="TS(this)">Project ↑</div>
          <div class="th" data-col="tvl" onclick="TS(this)" style="text-align:right">TVL</div>
          <div class="th" data-col="volume24h" onclick="TS(this)" style="text-align:right">24h Vol</div>
          <div class="th" data-col="users" onclick="TS(this)" style="text-align:right">Users</div>
          <div class="th" style="text-align:right">Status</div>
        </div>
        <div id="table-body"></div>
      </div>
    </div>
  </main>
</div>

<script>
// ─── Security ───────────────────────────────────────────────────────────────
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');}
function safeUrl(u){if(!u)return '#';try{const p=new URL(u);return p.protocol==='https:'?esc(u):'#';}catch{return '#';}}

function catPills(cats){
  return cats.map(c=>'<span class="cat-pill">'+esc(c)+'</span>').join('');
}
function fU(n){if(!n&&n!==0)return'—';const a=Math.abs(n),s=n<0?'-':'';if(a>=1e9)return s+'$'+(a/1e9).toFixed(2)+'B';if(a>=1e6)return s+'$'+(a/1e6).toFixed(2)+'M';if(a>=1e3)return s+'$'+(a/1e3).toFixed(0)+'K';return s+'$'+a.toFixed(0);}
function fN(n){if(!n)return'—';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(0)+'K';return String(n);}

// ─── Filter ──────────────────────────────────────────────────────────────────
function applyFilters(){
  let l=[...P];
  if(S.search){
    const q=S.search.toLowerCase();
    l=l.filter(p=>p.name.toLowerCase().includes(q)||p.desc.toLowerCase().includes(q)||p.cat.toLowerCase().includes(q));
  }
  if(!S.activeCats.has('all')&&S.activeCats.size>0){
    l=l.filter(p=>{
      const allCats=p.cats||[p.cat];
      return allCats.some(c=>S.activeCats.has(c));
    });
  }
          l.sort((a,b)=>{
    if(S.sort==='tvl')     return (b.tvl||0)-(a.tvl||0);
    if(S.sort==='launched')return b.launched.localeCompare(a.launched);
    if(S.sort==='users')   return (b.users||0)-(a.users||0);
    return a.name.localeCompare(b.name);
  });
  return l;
}

// ─── GRID render ─────────────────────────────────────────────────────────────
// FIX: card is <div> not <a>, so nested <a> socials are valid HTML
function renderGrid(list){
  const el=document.getElementById('grid-view');
  if(!list.length){el.innerHTML='<div class="empty">No projects match your filters</div>';return;}
  const grouped=S.activeCats.has('all')&&S.sort==='name';
  const sorted=grouped?[...list].sort((a,b)=>a.cat.localeCompare(b.cat)||a.name.localeCompare(b.name)):list;
  let html='', lastCat=null;
  sorted.forEach(p=>{
    if(grouped&&p.cat!==lastCat){
      lastCat=p.cat;
      html+=`<div class="cat-header"><div class="cat-header-line"></div><span class="cat-header-lbl">${esc(p.cat)}</span><div class="cat-header-line"></div></div>`;
    }
    // Metrics: pick 2 most relevant
    const m=[];
    if(p.tvl)    m.push(`<div><div class="metric-lbl">TVL</div><div class="metric-val">${fU(p.tvl)}</div></div>`);
    if(p.vol)    m.push(`<div><div class="metric-lbl">24h Vol</div><div class="metric-val">${fU(p.vol)}</div></div>`);
    if(p.users)  m.push(`<div><div class="metric-lbl">Users</div><div class="metric-val">${fN(p.users)}</div></div>`);

    const metrics=m.slice(0,2).join('');

    // Social buttons inside card
    const twBtn=p.tw?`<a href="${safeUrl(p.tw)}" class="soc-btn tw" target="_blank" rel="noopener" title="Twitter/X" onclick="event.stopPropagation()">${X_SVG}</a>`:'';
    const dcBtn=p.dc?`<a href="${safeUrl(p.dc)}" class="soc-btn dc" target="_blank" rel="noopener" title="Discord" onclick="event.stopPropagation()">${DC_SVG}</a>`:'';

    html+=`<div class="project-card" onclick="window.open('${safeUrl(p.url)}','_blank','noopener')" role="link" tabindex="0" aria-label="${esc(p.name)}">
  <div class="card-top"><div class="card-logo">${getFaviconHtml(p,28)}</div><div class="card-badges">${badges(p)}</div></div>
  <div class="card-name">${esc(p.name)}</div>
  <div class="card-cat">${catPills(p.cats||[p.cat])}</div>
  <div class="card-desc">${esc(p.desc)}</div>
  ${metrics?`<div class="card-metrics">${metrics}</div>`:''}
  <div class="card-footer">
    <div class="card-socials">${twBtn}${dcBtn}</div>
    <a href="${safeUrl(p.url)}" class="card-site" target="_blank" rel="noopener" title="Website" onclick="event.stopPropagation()">
      <span class="chain-dot"></span>Visit ↗
    </a>
  </div>
</div>`;
  });
  el.innerHTML=html;
}

// ─── TABLE render ─────────────────────────────────────────────────────────────
function renderTable(list){
  const el=document.getElementById('table-body');
  if(!list.length){el.innerHTML='<div class="empty">No projects match</div>';return;}
  el.innerHTML=list.map((p,i)=>{
    const twLink=p.tw?`<a href="${safeUrl(p.tw)}" class="tr-link-btn tw" target="_blank" rel="noopener">${X_SVG} Twitter</a>`:'';
    const dcLink=p.dc?`<a href="${safeUrl(p.dc)}" class="tr-link-btn dc" target="_blank" rel="noopener">${DC_SVG} Discord</a>`:'';
    const siteLink=`<a href="${safeUrl(p.url)}" class="tr-link-btn site" target="_blank" rel="noopener">${SITE_SVG} Website</a>`;
    const st=p.trust==='verified'?'<span class="badge b-verified" onmouseenter="showTip(event,this)" onmouseleave="hideTip()">\u2713 verified</span>':'';
    return `<div id="trw-${esc(p.id)}">
  <div class="tr-main" onclick="toggleRow('${esc(p.id)}')">
    <button class="tr-expand-btn" id="btn-${esc(p.id)}" onclick="event.stopPropagation();toggleRow('${esc(p.id)}')" title="Show links">▶</button>
    <div class="tr-num">${i+1}</div>
    <div class="tr-name-wrap">
      <div class="tr-logo">${getFaviconHtml(p,20)}</div>
      <div class="tr-info">
        <div class="tr-name">${esc(p.name)}</div>
        <div class="tr-cat">${esc(p.cat)}</div>
      </div>
    </div>
    <div class="tr-val" style="text-align:right">${fU(p.tvl)}</div>
    <div class="tr-val" style="text-align:right">${fU(p.vol)}</div>
    <div class="tr-val" style="text-align:right">${fN(p.users)}</div>
    <div class="tr-status">${st}</div>
  </div>
  <div class="tr-links" id="trl-${esc(p.id)}">${siteLink}${twLink}${dcLink}</div>
</div>`;
  }).join('');
}

function toggleRow(id){
  const btn=document.getElementById('btn-'+id);
  const row=document.getElementById('trl-'+id);
  if(!btn||!row)return;
  const open=row.classList.toggle('open');
  btn.classList.toggle('open',open);
  btn.textContent=open?'▼':'▶';
}

// ─── SIDEBAR: categories (multi-select) ─────────────────────────────────────
function renderCats(){
  const el=document.getElementById('cat-list');
  const counts={};
  P.forEach(p=>{const cc=p.cats||[p.cat];cc.forEach(c=>{counts[c]=(counts[c]||0)+1;});});
  el.innerHTML=CATS.map(c=>{
    const n=c.id==='all'?P.length:(counts[c.id]||0);
    const active=S.activeCats.has(c.id);
    return `<div class="cat-item${active?' active':''}" data-cat="${esc(c.id)}">
  <div class="cat-left">
    <div class="cat-check">${active?CHECK_SVG:''}</div>
    <span class="cat-icon-emoji">${esc(c.icon)}</span>
    <span class="cat-lbl">${esc(c.label)}</span>
  </div>
  <span class="cat-count">${n}</span>
</div>`;
  }).join('');
  el.querySelectorAll('.cat-item').forEach(item=>{
    item.addEventListener('click',()=>{
      const cat=item.dataset.cat;
      if(cat==='all'){
        S.activeCats=new Set(['all']);
      } else {
        S.activeCats.delete('all');
        if(S.activeCats.has(cat)){
          S.activeCats.delete(cat);
          if(S.activeCats.size===0) S.activeCats.add('all');
        } else {
          S.activeCats.add(cat);
        }
      }
      render();
    });
  });
}

// ─── Stats ────────────────────────────────────────────────────────────────────
function renderStats(list){
  document.getElementById('st-total').textContent=P.length;
  document.getElementById('st-live').textContent=P.filter(p=>p.status==='live').length;
  document.getElementById('st-tvl').textContent=fU(P.reduce((s,p)=>s+(p.tvl||0),0));
  document.getElementById('st-sor').textContent=P.filter(p=>p.soroban).length;
  document.getElementById('result-count').textContent=`${list.length} project${list.length!==1?'s':''}`;
}

// ─── Main render ─────────────────────────────────────────────────────────────
function render(){
  const list=applyFilters();
  renderStats(list);
  renderCats();
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.toggle('active',b.dataset.sort===S.sort));
  document.querySelectorAll('.sort-btn').forEach(b=>b.addEventListener('click',()=>{S.sort=b.dataset.sort;render();}));
  S.view==='grid'?renderGrid(list):renderTable(list);
}

// Keyboard accessibility for cards
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&e.target.classList.contains('project-card')) e.target.click();
});

function setView(v){
  S.view=v;
  document.getElementById('grid-view').style.display=v==='grid'?'grid':'none';
  document.getElementById('table-view').style.display=v==='table'?'block':'none';
  document.getElementById('btn-grid').classList.toggle('active',v==='grid');
  document.getElementById('btn-table').classList.toggle('active',v==='table');
  render();
}


function showTip(e,el){
  const t=document.getElementById('g-tip');
  t.textContent='Followed by @StellarOrg or @BuildOnStellar on Twitter';
  t.style.display='block';
  const r=el.getBoundingClientRect();
  t.style.left=(r.left+r.width/2)+'px';
  t.style.top=(r.top-8-t.offsetHeight)+'px';
}
function hideTip(){document.getElementById('g-tip').style.display='none';}

render();
setView('grid');
</script>
</body>
</html>
